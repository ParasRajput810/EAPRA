<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" width="700" height="600" role="img" aria-labelledby="t d">
  <title id="t">EAPRA architecture: three planes, two envelopes, five currencies</title>
  <desc id="d">The request path runs from client through API and auth, the AI gateway, and a provider. The control plane and data plane are named but not implemented. Two dashed envelopes wrap every stage. The Request Receipt meters five currencies: latency and cost are metered; trust, freshness and agency report not_metered.</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#57606a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .h { font: 600 14px system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; fill: #1f2328; }
      .s { font: 400 11.5px system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; fill: #57606a; }
      .n { font: 400 12px system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; fill: #57606a; }
      .box { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
    </style>
  </defs>

  <rect x="0" y="0" width="700" height="600" fill="#f6f8fa"/>

  <rect x="16" y="16" width="668" height="472" rx="14" fill="#fff8c5" fill-opacity="0.45" stroke="#bf8700" stroke-width="1" stroke-dasharray="6 5"/>
  <text class="s" x="32" y="40">Governance &amp; telemetry envelope</text>

  <rect x="32" y="52" width="636" height="420" rx="12" fill="#dafbe1" fill-opacity="0.45" stroke="#1a7f37" stroke-width="1" stroke-dasharray="6 5"/>
  <text class="s" x="48" y="76">Platform foundation envelope</text>

  <rect x="50" y="88" width="600" height="126" rx="10" fill="#ddf4ff" fill-opacity="0.6" stroke="#0969da" stroke-width="1"/>
  <text class="h" x="66" y="110">Request path</text>

  <rect class="box" x="66" y="128" width="106" height="66" rx="8"/>
  <text class="h" x="119" y="166" text-anchor="middle">Client</text>
  <line x1="174" y1="161" x2="196" y2="161" stroke="#57606a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect class="box" x="198" y="128" width="106" height="66" rx="8"/>
  <text class="h" x="251" y="157" text-anchor="middle">API + auth</text>
  <text class="s" x="251" y="176" text-anchor="middle">header only</text>
  <line x1="306" y1="161" x2="328" y2="161" stroke="#57606a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="330" y="128" width="126" height="66" rx="8" fill="#ffffff" stroke="#0969da" stroke-width="2"/>
  <text class="h" x="393" y="157" text-anchor="middle">AI gateway</text>
  <text class="s" x="393" y="176" text-anchor="middle">decide + meter</text>
  <line x1="458" y1="161" x2="480" y2="161" stroke="#57606a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect class="box" x="482" y="128" width="152" height="66" rx="8"/>
  <text class="h" x="558" y="157" text-anchor="middle">Provider (SPI)</text>
  <text class="s" x="558" y="176" text-anchor="middle">stub · openai-compatible</text>

  <rect x="50" y="228" width="292" height="106" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="h" x="66" y="252">Control plane</text>
  <text class="s" x="66" y="276">registries · policy · promotion</text>
  <text class="s" x="66" y="300">not implemented</text>

  <rect x="358" y="228" width="292" height="106" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="h" x="374" y="252">Data plane</text>
  <text class="s" x="374" y="276">knowledge base · embeddings · index</text>
  <text class="s" x="374" y="300">not implemented</text>

  <rect x="50" y="348" width="600" height="108" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text class="h" x="66" y="372">Request Receipt — the meter on five currencies</text>

  <rect x="66" y="388" width="106" height="52" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1"/>
  <text class="h" x="119" y="409" text-anchor="middle">Latency</text>
  <text class="s" x="119" y="428" text-anchor="middle">metered</text>

  <rect x="182" y="388" width="106" height="52" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1"/>
  <text class="h" x="235" y="409" text-anchor="middle">Cost</text>
  <text class="s" x="235" y="428" text-anchor="middle">metered</text>

  <rect x="298" y="388" width="106" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="h" x="351" y="409" text-anchor="middle">Trust</text>
  <text class="s" x="351" y="428" text-anchor="middle">not_metered</text>

  <rect x="414" y="388" width="106" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="h" x="467" y="409" text-anchor="middle">Freshness</text>
  <text class="s" x="467" y="428" text-anchor="middle">not_metered</text>

  <rect x="530" y="388" width="104" height="52" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4 4"/>
  <text class="h" x="582" y="409" text-anchor="middle">Agency</text>
  <text class="s" x="582" y="428" text-anchor="middle">not_metered</text>

  <text class="n" x="16" y="518">The envelopes wrap every stage. They are not stages in the path.</text>
  <text class="n" x="16" y="542">The AI gateway sets the currency allocation. The Receipt reads it.</text>
  <text class="n" x="16" y="566">Three currencies report not_metered rather than a comfortable zero.</text>
</svg>
